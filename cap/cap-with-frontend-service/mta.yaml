_schema-version: 3.3.0
ID: cap-with-frontend-service
description: A simple CAP project.
version: 1.0.0
modules:
- name: cap-with-frontend-service-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: cap-with-frontend-service-db
  - name: cap-with-frontend-service-auth
  - name: cap-with-frontend-service-connectivity
  - name: cap-with-frontend-service-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: cap-with-frontend-service-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: cap-with-frontend-service-db
  parameters:
    buildpack: nodejs_buildpack
- name: cap-with-frontend-service-app-deployer
  type: com.sap.application.content
  path: gen
  requires:
  - name: cap-with-frontend-service-auth
  - name: srv-api
  - name: cap-with-frontend-service-app-front
    parameters:
      content-target: true
  - name: cap-with-frontend-service-html5-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  parameters:
    config:
      destinations:
      - forwardAuthToken: true
        name: srv-api
        url: ~{srv-api/srv-url}
  build-parameters:
    build-result: app/
    requires:
    - artifacts:
      - feprojectui.zip
      name: feprojectui
      target-path: app/
- name: feprojectui
  type: html5
  path: app/feproject-ui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: cap-with-frontend-service-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: cap-with-frontend-service-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: cap-with-frontend-service-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: cap-with-frontend-service-connectivity
  type: org.cloudfoundry.managed-service
  parameters:
    service: connectivity
    service-plan: lite
- name: cap-with-frontend-service-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  requires:
  - name: srv-api
- name: cap-with-frontend-service-app-front
  type: org.cloudfoundry.managed-service
  parameters:
    service: app-front
    service-plan: developer
- name: cap-with-frontend-service-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
